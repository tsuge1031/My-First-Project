<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ゴルフ持ち物・ラウンド管理</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>ゴルフ持ち物・ラウンド管理</h1>
        <p class="sync-badge" id="sync-badge" aria-live="polite"></p>
      </div>
      <div class="header-meta">
        <nav class="nav-tabs" id="nav-tabs" aria-label="メイン"></nav>
      </div>
    </header>
    <main>
      <div id="global-message" class="hidden" role="status"></div>
      <section id="view-master" aria-label="持ち物マスタ"></section>
      <section id="view-events" class="hidden" aria-label="ラウンド一覧"></section>
      <section id="view-score-history" class="hidden" aria-label="スコア履歴"></section>
      <section id="view-event-detail" class="hidden" aria-label="ラウンド詳細"></section>
    </main>
    <script src="js/app.js"></script>
  </body>
</html>
